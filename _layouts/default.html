<!DOCTYPE html>
<html>
  {% include head.html %}
  <body>
    <nav>
      <div class="nav-inner">
        <a class="brand" href="/">{{ site.name }}</a>
        <ul>
          <li><a href="/" {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>Home</a></li>
          <li><a href="/about" {% if page.url contains '/about' %}class="active"{% endif %}>About</a></li>
          <li><a href="/cv" {% if page.url contains '/cv' %}class="active"{% endif %}>CV</a></li>
          <li><a href="/blog" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </nav>
    <div class="page">
      <aside class="sidebar">
        {% include sidebar.html %}
      </aside>
      <div class="container">
        {{ content }}
      </div>
    </div>
    <footer>
      <ul>
        <li><a href="mailto:nitbaditya@gmail.com">Email</a></li>
        <li><a href="https://github.com/adityavarma1234">github.com/adityavarma1234</a></li>
      </ul>
    </footer>
    {% include scripts.html %}
  </body>
</html>
